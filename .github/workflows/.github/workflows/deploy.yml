name: Deploy to Vercel

  on:
  push:
    branches:
      - main

        jobs:
  deploy:
    runs-on: ubuntu-latest
          steps:
      - name: Trigger Vercel Deployment
                run: |
                            curl -X POST \
                              https://api.vercel.com/v1/integrations/deploy/clvx2kl6s000qmn0vz1eqxvjg/trigger-vercel-deploy-hook \
            -H "Authorization: Bearer ${{ secrets.VERCEL_TOKEN }}" \
                          -H "Content-Type: application/json" \
                          -d '{"buildCommand": "npm run build", "outputDirectory": "dist"}'
